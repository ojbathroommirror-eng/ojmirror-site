services:
  db:
    image: mariadb:11.4
    container_name: ojmirror-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME}
      MARIADB_USER: ${WORDPRESS_DB_USER}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:6.8-php8.2-apache
    container_name: ojmirror-wp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      WORDPRESS_CONFIG_EXTRA: |
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && strpos($$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false) {
          $$_SERVER['HTTPS'] = 'on';
        }
        define('WP_HOME', 'https://' . getenv('PRIMARY_DOMAIN'));
        define('WP_SITEURL', 'https://' . getenv('PRIMARY_DOMAIN'));
        define('FORCE_SSL_ADMIN', true);
    volumes:
      - wordpress_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content

  caddy:
    image: caddy:2.8-alpine
    container_name: ojmirror-caddy
    depends_on:
      - wordpress
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      ROOT_DOMAIN: ${ROOT_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  wordpress_data:
  caddy_data:
  caddy_config:
